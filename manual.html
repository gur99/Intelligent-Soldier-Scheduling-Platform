<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="./icon/icon.png">
  <link rel="shortcut icon" href="./icon/icon.png">
  <link rel="apple-touch-icon" href="./icon/icon.png">

  <link rel="manifest" href="./manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">

  <meta charset="UTF-8" />
  <title>Intelligent Soldier Scheduling – קלט ידני</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Intelligent Soldier Scheduling – קלט ידני</h1>
  </header>

  <main class="app-main">
    <div class="button-row">
      <a href="index.html" id="back-to-main-btn" class="secondary-btn">
        חזרה למחולל השמירות
      </a>
    </div>
    <section class="tabs">
      <button class="tab-btn active" data-tab="soldiers-tab">רשימת חיילים ידנית</button>
      <button class="tab-btn" data-tab="previous-roster-tab">רשמית שמירות קודמת ידני</button>
    </section>

    <section id="soldiers-tab" class="card tab-content active">
      <h2>רשימת חיילים ידנית</h2>

      <div class="field-group" style="margin-bottom: 1rem;">
        <label for="soldiers-file-input">טען רשימת חיילים מקובץ (CSV/TSV)</label>
        <div class="button-row" style="align-items: center; gap: 0.5rem;">
          <input type="file" id="soldiers-file-input" accept=".csv,.tsv,.txt,text/csv,text/plain" />
          <span id="soldiers-load-message" class="import-message" aria-live="polite"></span>
        </div>
      </div>

      <div id="soldiers-validation" class="error-box"></div>

      <section id="soldier-groups-builder" class="groups-builder">
        <div class="group-section" data-group="A">
          <header class="group-header group-a-header">
            <h3>קבוצה א</h3>
            <div class="group-switch-wrap">
              <button type="button" class="secondary-btn group-switch-btn" data-group="A" aria-haspopup="true" aria-expanded="false">
                החלף קבוצה
              </button>
              <div class="group-switch-dropdown" id="group-switch-dropdown-A" hidden></div>
            </div>
          </header>
          <div class="group-body">
            <div class="group-rows" id="group-A-rows"></div>
            <div class="group-actions">
              <button type="button" class="secondary-btn add-fighter-btn" data-group="A">
                הוסף לוחם
              </button>
            </div>
          </div>
        </div>

        <div class="group-section" data-group="B">
          <header class="group-header group-b-header">
            <h3>קבוצה ב</h3>
            <div class="group-switch-wrap">
              <button type="button" class="secondary-btn group-switch-btn" data-group="B" aria-haspopup="true" aria-expanded="false">
                החלף קבוצה
              </button>
              <div class="group-switch-dropdown" id="group-switch-dropdown-B" hidden></div>
            </div>
          </header>
          <div class="group-body">
            <div class="group-rows" id="group-B-rows"></div>
            <div class="group-actions">
              <button type="button" class="secondary-btn add-fighter-btn" data-group="B">
                הוסף לוחם
              </button>
            </div>
          </div>
        </div>

        <div class="group-section" data-group="C">
          <header class="group-header group-c-header">
            <h3>קבוצה ג</h3>
            <div class="group-switch-wrap">
              <button type="button" class="secondary-btn group-switch-btn" data-group="C" aria-haspopup="true" aria-expanded="false">
                החלף קבוצה
              </button>
              <div class="group-switch-dropdown" id="group-switch-dropdown-C" hidden></div>
            </div>
          </header>
          <div class="group-body">
            <div class="group-rows" id="group-C-rows"></div>
            <div class="group-actions">
              <button type="button" class="secondary-btn add-fighter-btn" data-group="C">
                הוסף לוחם
              </button>
            </div>
          </div>
        </div>
      </section>

      <div class="table-wrapper">
        <table id="soldiers-table" dir="rtl">
          <thead>
            <tr>
              <th>שם</th>
              <th>קבוצה</th>
              <th>מפקד</th>
              <th>חוזר מהבית</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <div class="button-row">
        <button id="export-soldiers-btn" class="secondary-btn">ייצוא רשימת חיילים (CSV)</button>
        <button id="clear-soldiers-btn" class="danger-btn">נקה הכל</button>
      </div>
    </section>

    <section id="previous-roster-tab" class="card tab-content">
      <h2>רשימת שמירות קודמת- מילוי ידני</h2>
      <form id="previous-roster-form" class="form-grid">
        <div class="field-group">
          <label for="pr-date">תאריך תחילת שמירות (של רשימה קודמת)</label>
          <input type="date" id="pr-date" required />
        </div>
      </form>

      <div class="field-group" style="margin-top: 1rem;">
        <label for="whatsapp-paste">הדבק רשימת שמירות מפורמט וואטסאפ</label>
        <textarea id="whatsapp-paste" rows="10" placeholder="הדבק כאן את הסידור מפורמט וואטסאפ (כולל כותרות, שעות ומשטח/ש.ג אחורי)..." dir="rtl"></textarea>
        <div id="whatsapp-import-message" class="import-message" aria-live="polite"></div>
        <button type="button" id="whatsapp-import-btn" class="primary-btn">ייבא לרשימה הקודמת</button>
      </div>

      <div class="table-wrapper">
        <table id="previous-roster-table" dir="rtl">
          <thead>
            <tr>
              <th>תאריך</th>
              <th>תחילת שמירה</th>
              <th>סיום שמירה</th>
              <th>עמדה</th>
              <th>שומר</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <div class="button-row">
        <button id="export-previous-roster-btn" class="secondary-btn" disabled>ייצוא רשימת שמירות קודמת (CSV)</button>
        <button id="clear-previous-roster-btn" class="danger-btn">נקה הכל</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/manualPage.js"></script>
</body>
</html>
