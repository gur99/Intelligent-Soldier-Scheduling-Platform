<!DOCTYPE html>
<html lang="he">
<head>
  <link rel="icon" type="image/png" href="./icon/icon.png">
  <link rel="shortcut icon" href="./icon/icon.png">
  <link rel="apple-touch-icon" href="./icon/icon.png">

  <link rel="manifest" href="./manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">

  <meta charset="UTF-8" />
  <title>Manual Input – Intelligent Soldier Scheduling</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Intelligent Soldier Scheduling - Manual Input</h1>
    <nav>
      <a href="index.html">Back to generator</a>
    </nav>
  </header>

  <main class="app-main">
    <section class="tabs">
      <button class="tab-btn active" data-tab="soldiers-tab">רשימת חיילים ידנית</button>
      <button class="tab-btn" data-tab="previous-roster-tab">רוסטר קודם ידני</button>
    </section>

    <section id="soldiers-tab" class="card tab-content active">
      <h2>רשימת חיילים ידנית</h2>

      <div id="soldiers-validation" class="error-box"></div>

      <section id="soldier-groups-builder" class="groups-builder">
        <div class="group-section" data-group="A">
          <header class="group-header group-a-header">
            <h3>קבוצה A</h3>
          </header>
          <div class="group-body">
            <div class="group-rows" id="group-A-rows"></div>
            <div class="group-actions">
              <button type="button" class="secondary-btn add-fighter-btn" data-group="A">
                הוסף לוחם
              </button>
            </div>
          </div>
        </div>

        <div class="group-section" data-group="B">
          <header class="group-header group-b-header">
            <h3>קבוצה B</h3>
          </header>
          <div class="group-body">
            <div class="group-rows" id="group-B-rows"></div>
            <div class="group-actions">
              <button type="button" class="secondary-btn add-fighter-btn" data-group="B">
                הוסף לוחם
              </button>
            </div>
          </div>
        </div>

        <div class="group-section" data-group="C">
          <header class="group-header group-c-header">
            <h3>קבוצה C</h3>
          </header>
          <div class="group-body">
            <div class="group-rows" id="group-C-rows"></div>
            <div class="group-actions">
              <button type="button" class="secondary-btn add-fighter-btn" data-group="C">
                הוסף לוחם
              </button>
            </div>
          </div>
        </div>
      </section>

      <div class="table-wrapper">
        <table id="soldiers-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Group</th>
              <th>Commander</th>
              <th>Returned today</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <div class="button-row">
        <button id="export-soldiers-btn" class="secondary-btn">Export Soldiers CSV</button>
        <button id="clear-soldiers-btn" class="danger-btn">Clear All</button>
      </div>
    </section>

    <section id="previous-roster-tab" class="card tab-content">
      <h2>רוסטר קודם ידני</h2>
      <form id="previous-roster-form" class="form-grid">
        <div class="field-group">
          <label for="pr-date">Start date (Day D)</label>
          <input type="date" id="pr-date" required />
        </div>
      </form>

      <div class="table-wrapper">
        <table id="previous-roster-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Start</th>
              <th>End</th>
              <th>Position</th>
              <th>Name</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>

      <div class="button-row">
        <button id="export-previous-roster-btn" class="secondary-btn" disabled>Export Previous Roster CSV</button>
        <button id="clear-previous-roster-btn" class="danger-btn">Clear All</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/manualPage.js"></script>
</body>
</html>
